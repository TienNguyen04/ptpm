version: '3.8'

services:
  # 1. API GATEWAY (Chạy cổng 8086, mở ra cho Frontend gọi)
#  bank-gateway:
#    build: ./bank-gateway
#    ports:
#      - "8086:8086"
#    networks:
#      - bank-network

  # 2. ACCOUNT SERVICE - Tiên (Cổng 8080)
  account-service:
    build: ./AccountService/accountService
    ports:
      - "8080:8080"
    networks:
      - bank-network

  # 3. USER SERVICE - Linh (Cổng 8081)
  user-service:
    build: ./UserService/user-service
    ports:
      - "8081:8081"
    networks:
      - bank-network

  # 4. TRANSACTION SERVICE - Sang (Cổng 8082)
  trans-service:
    build: ./TransactionService/transaction-service
    ports:
      - "8082:8082"
    networks:
      - bank-network

  # 5. SAVING SERVICE - Tiên (Cổng 8083)
  saving-service:
    build: ./SavingService/SavingService
    ports:
      - "8083:8083"
    networks:
      - bank-network

  # 6. NOTIFICATION SERVICE - Nguyệt (Cổng 8084)
  # (Giả sử Nguyệt chưa code xong, mình thêm dấu # để tạm tắt nó đi)
  noti-service:
     build: ./NotificationService
     ports:
       - "8084:8084"
     networks:
       - bank-network


  # 7. FRONTEND WEB
  frontend-web:
    build: ./front end/project
    ports:
      - "5500:80"
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge